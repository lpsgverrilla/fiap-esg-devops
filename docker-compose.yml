name: fiap-esg-${APP_ENV:-local}

services:
  api:
    build: .
    image: fiap-esg-api:${APP_ENV:-local}
    container_name: fiap-esg-api-${APP_ENV:-local}
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_PORT: 8000
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_ROOT_USER: ${MONGO_ROOT_USER}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_DB: ${MONGO_DB}
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8000}:8000"
    networks:
      - esg-net

  mongo:
    image: mongo:7
    container_name: fiap-esg-mongo-${APP_ENV:-local}
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - esg-net

volumes:
  mongo-data:
    name: fiap-esg-mongo-data-${APP_ENV:-local}

networks:
  esg-net:
    name: fiap-esg-net-${APP_ENV:-local}
